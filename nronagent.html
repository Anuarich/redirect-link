<script>
const tgApp = "tg://resolve?domain=nronagent";
const tgWeb = "https://t.me/nronagent";

function redirect() {
  // отправляем событие в GA
  gtag('event', 'redirect_to_telegram', {
    event_category: 'QR',
    event_label: 'nronagent',
    transport_type: 'beacon'
  });

  // пробуем открыть приложение
  window.location = tgApp;

  // если не открылось — fallback на веб
  setTimeout(function() {
    window.location = tgWeb;
  }, 1200);
}

window.onload = redirect;
</script>
