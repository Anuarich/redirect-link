<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W3L0DG2NNN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W3L0DG2NNN');
  </script>

  <script>
    const tgApp = "tg://resolve?domain=nronagent";
    const tgWeb = "https://t.me/nronagent";

    function openTelegram() {

      // фиксируем событие
      gtag('event', 'redirect_to_telegram', {
        event_category: 'QR',
        event_label: 'nronagent',
        transport_type: 'beacon'
      });

      // пробуем открыть приложение
      window.location.href = tgApp;

      // если приложение не открылось — fallback
      setTimeout(function() {
        window.location.href = tgWeb;
      }, 1500);
    }

    window.onload = openTelegram;
  </script>
</head>

<body>
  <p>Redirecting to Telegram...</p>
</body>
</html>
