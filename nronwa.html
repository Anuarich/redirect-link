<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting to WhatsApp...</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W3L0DG2NNN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W3L0DG2NNN');
  </script>

  <script>
    // Thai phone number in international format
    const phone = "66989909550"; 
    
    const waApp = "whatsapp://send?phone=" + phone;
    const waWeb = "https://wa.me/" + phone;

    function openWhatsApp() {
      // Event tracking
      gtag('event', 'redirect_to_whatsapp', {
        event_category: 'QR',
        event_label: 'thai_number_098',
        transport_type: 'beacon'
      });

      // Try to open WhatsApp app directly
      window.location.href = waApp;

      // Fallback to web version if app doesn't open
      setTimeout(function() {
        window.location.href = waWeb;
      }, 1500);
    }

    window.onload = openWhatsApp;
  </script>
</head>
<body>
  <p>Redirecting to WhatsApp...</p>
</body>
</html>
